source = ~/.cache/wal/colors-hyprland.conf
#Decorations
general {
    gaps_in = 5
    gaps_out = 7
    border_size = 3
    col.active_border = $color1 $color2 45deg
    col.inactive_border = $background
    layout = dwindle
}

decoration {
    rounding = 6
    
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }
    
    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = 0x66000000
    }
}
