#‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ

# ----------------------------------------------------- 
# Window Rules 
# ----------------------------------------------------- 

# Opacity Rule
windowrule = match:class $terminal, opacity 0.9 0.75
windowrule = match:class org.gnome.Nautilus, opacity 1 0.8
windowrule = match:class com.mitchellh.ghostty, opacity 1 0.8
windowrule = match:class zen, opacity 0.85 0.8
windowrule = match:class helium, opacity 0.85
windowrule = match:class brave-origin-nightly, opacity 0.85

# XWayland Video Bridge
windowrule = match:class xwaylandvideobridge, opacity 0.0 override 0.0 override
windowrule = match:class xwaylandvideobridge, no_anim on
windowrule = match:class xwaylandvideobridge, no_focus on
windowrule = match:class xwaylandvideobridge, no_initial_focus on

# MPV
windowrule = match:class mpv, float on
windowrule = match:class mpv, center on
windowrule = match:class mpv, size (monitor_w*0.65) (monitor_h*0.75)

# Waypaper
windowrule = match:class waypaper, float on
windowrule = match:class waypaper, center on
windowrule = match:class waypaper, size (monitor_w*0.65) (monitor_h*0.65)

# Pyprland Scratchpads
windowrule = border_size 0, match:class btop-scratchpad
windowrule = border_size 0, match:class rmpc-scratchpad
windowrule = border_size 0, match:class org.pwmt.zathura

# Nautilus
windowrule = match:class org.gnome.Nautilus, float on
windowrule = match:class org.gnome.Nautilus, center on
windowrule = match:class org.gnome.Nautilus, size (monitor_w*0.65) (monitor_h*0.65)

# Nautilus
windowrule = match:class org.gnome.NautilusPreviewer, float on
windowrule = match:class org.gnome.NautilusPreviewer, center on
windowrule = match:class org.gnome.NautilusPreviewer, size (monitor_w*0.65) (monitor_h*0.65)

# Image Viewer Loupe
windowrule = match:class org.gnome.Loupe, float on
windowrule = match:class org.gnome.Loupe, center on
windowrule = match:class org.gnome.Loupe, size (monitor_w*0.75) (monitor_h*0.75)

# Qalculate
windowrule = match:class qalculate-gtk, float on
windowrule = match:class qalculate-gtk, center on
windowrule = match:class qalculate-gtk, size (monitor_w*0.6) (monitor_h*0.6)

#Waydroid
windowrule = match:class Waydroid, float on
windowrule = match:class Waydroid, center on
windowrule = match:class Waydroid, size (monitor_w*0.5) (monitor_h*0.95)

#LocalSend
windowrule = match:class localsend, float on
windowrule = match:class localsend, center on
windowrule = match:class localsend, size (monitor_w*0.4) (monitor_h*0.85)

#Steam
windowrule = match:class steam, float on
windowrule = match:class steam, center on
windowrule = match:class steam, size (monitor_w*0.85) (monitor_h*0.75)

#Pavucontrol
windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class org.pulseaudio.pavucontrol, center on
windowrule = match:class org.pulseaudio.pavucontrol, size (monitor_w*0.85) (monitor_h*0.75)

#Bluemam
windowrule = match:class blueman-manager, float on
windowrule = match:class blueman-manager, center on
windowrule = match:class blueman-manager, size (monitor_w*0.35) (monitor_h*0.75)

#Blurs
layerrule = blur on, ignore_alpha 0.1, match:namespace logout_dialog
layerrule = blur on, ignore_alpha 0.1, match:namespace swayosd
layerrule = blur on, ignore_alpha 0.1, match:namespace swaync-control-center
layerrule = blur on, ignore_alpha 0.1, match:namespace swaync-notification-window
layerrule = blur on, ignore_alpha 0.1, match:namespace rofi

# Custom Animations
# layerrule = animation fade, match:namespace rofi
# layerrule = animation fade, match:namespace swaync-notification-window
layerrule = animation slide top, match:namespace swaync-control-center
# layerrule = animation fade, match:namespace swayosd
# layerrule = no_anim on, match:namespace selection
# layerrule = no_anim on, match:namespace slurp
# layerrule = no_anim on, match:namespace hyprpicker
# layerrule = animation fade, match:namespace logout_dialog

#Steam Games
windowrule = match:class ^steam_app_.*, fullscreen on

# GTK File Dialogs (Floating & Centered)
windowrule = float on, match:title ^(Open File)$
windowrule = size 800 600, match:title ^(Open File)$
windowrule = center on, match:title ^(Open File)$

windowrule = float on, match:title ^(Select a File)$
windowrule = float on, match:title ^(Choose Folder)$
windowrule = float on, match:title ^(Save As)$

# Portal & System Dialogs
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(org.freedesktop.impl.portal.desktop.gtk)$

# Also center and set size
windowrule = float on, match:class zen, match:title Picture-in-Picture
windowrule = size 748 500, match:class zen, match:title Picture-in-Picture

# $notes
windowrule = match:class $notes, float on
windowrule = match:class $notes, center on
windowrule = match:class $notes, size (monitor_w*0.85) (monitor_h*0.85)
