#‚ĖĎ‚Ėą‚ĖÄ‚ĖĄ‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚ĖÄ‚ĖÄ‚Ėą
#‚ĖĎ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖĎ‚ĖĎ‚ĖÄ‚ĖÄ‚ĖÄ


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

$mainMod = SUPER

# System Binds
bind = $mainMod, N, pseudo, # dwindle
bind = , 75, exec, hyprlock
bind = $mainMod, Q, exec, kitty
bind = $mainMod, W, killactive, 
bind = $mainMod, S, exec, ~/.config/hypr/smart-float.sh # Enables smartfloat instead of togglefloating
bind = $mainMod, Escape, exec, wlogout
bind = $mainMod SHIFT, B, exec, killall -SIGUSR2 waybar
bind = , 248, exec, /usr/local/bin/toggle-screen
bind = , 156, exec, waypaper # Myasus key
bind = ALT SHIFT, C, exec, pkill -SIGUSR1 ie-r # Color Picker
bind = ALT SHIFT, H, exec, pkill -SIGUSR2 ie-r
bind = SUPER, V, exec, bash -c "cliphist list | rofi -dmenu -p 'Clipboard' | cliphist decode | wl-copy"

# Application Launchers
#bind = ALT, SPACE, exec, tofi-drun
bind = ALT, SPACE, exec, rofi -show drun
bind = $mainMod, F, exec, zen-browser
bind = $mainMod, E, exec, thunar
bind = $mainMod, C, exec, code


# Plugins
bind = SUPER, grave, hyprexpo:expo, toggle
bind = SUPER, return, exec, pypr toggle term
bind = SUPER, slash, exec, pypr toggle cheatsheet
bind = $mainMod, TAB, exec, pypr toggle btop


# Screenshots (Safely wrapped in a shell execution)
bind = $mainMod, SPACE, exec, sh -c 'grim -g "$(slurp)" - | swappy -f - > /dev/null'

# Volume and brightness
# --- Audio Control (SwayOSD on Main Monitor) ---
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --monitor eDP-1 --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --monitor eDP-1 --output-volume lower
bindl  = , XF86AudioMute, exec, swayosd-client --monitor eDP-1 --output-volume mute-toggle
bindl  = , XF86AudioMicMute, exec, swayosd-client --monitor eDP-1 --input-volume mute-toggle

# --- Brightness Control (SwayOSD on Main Monitor) ---
bindel = , XF86MonBrightnessUp, exec, swayosd-client --monitor eDP-1 --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --monitor eDP-1 --brightness lower

# --- ScreenPad Brightness (Hold SHIFT + Brightness Keys) ---
# This bypasses SwayOSD to directly talk to the bottom screen's hardware
bindel = SHIFT, XF86MonBrightnessUp, exec, brightnessctl -d asus_screenpad set 5%+
bindel = SHIFT, XF86MonBrightnessDown, exec, brightnessctl -d asus_screenpad set 5%-


# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows
bind = $mainMod ALT, h, movewindow, l
bind = $mainMod ALT, l, movewindow, r
bind = $mainMod ALT, k, movewindow, u
bind = $mainMod ALT, j, movewindow, d

# Resize windows
bind = $mainMod SHIFT, h, resizeactive, -100 0
bind = $mainMod SHIFT, l, resizeactive, 100 0
bind = $mainMod SHIFT, k, resizeactive, 0 -100
bind = $mainMod SHIFT, j, resizeactive, 0 100

# Cycle through existing windows
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

# Workspaces Mapping
# Main Laptop Screen (eDP-1)
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1

# Bottom Screen (DP-1)
workspace = 6, monitor:DP-1, default:true
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1

# HDMI Screen (HDMI-A-3)
workspace = 9, monitor:HDMI-A-3, default:true
workspace = 10, monitor:HDMI-A-3

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Emergency Hard Exit (Use with caution)
bind = SUPER SHIFT, E, exit,

# Force screens to turn on when the laptop lid is opened
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

# Japanese support
exec-once = fcitx5
