# Keyboard Layout & mouse & Trackpad
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.3
    }
    
    accel_profile = flat # mouse acceleration
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# Enable horizontal 3-finger swipe to switch workspaces
gestures {
    gesture = 3, horizontal, workspace
}

# Customize swipe behavior
workspace_swipe_distance = 5
workspace_swipe_min_speed_to_force = 5
workspace_swipe_invert = true
workspace_swipe_create_new = true
