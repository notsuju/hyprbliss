# --- Environment Variables ---
env = MOZ_ENABLE_WAYLAND,1


# Sourcing all the configs
source = ~/.config/hypr/startup.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/decorations.conf
source = ~/.config/hypr/plugins.conf
#source = ~/.config/hypr/workspaces.conf


# Keyboard Layout & mouse & Trackpad
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor= 0.3
    }
    
    accel_profile = flat # mouse acceleration
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}


# Enable horizontal 3-finger swipe to switch workspaces
gestures {
    gesture = 3, horizontal, workspace
}

# Optional: Customize swipe behavior
workspace_swipe_distance = 5
workspace_swipe_min_speed_to_force = 5
workspace_swipe_invert = true
workspace_swipe_create_new = true 

# --- Touchscreen Mapping Fix ---

# Map the SECONDARY touch device to the ScreenPad
device {
    name = elan9009:00-04f3:2c1b
    output = DP-1
}

# Map the MAIN touch device to the Main Screen
device {
    name = elan9008:00-04f3:2c1a
    output = eDP-1
}
