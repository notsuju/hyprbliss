# Autostarts
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-clip-persist --clipboard regular
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpm reload -n
exec-once = pypr
exec-once = swww-daemon
exec-once = swayosd-server
exec-once = wlsunset -l 20.5 -L 78.9

# Launch core background apps individually
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = sleep 2 && /home/suju/.local/bin/waypaper --restore
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

# Handle the idle daemon
exec-once = killall -q hypridle; hypridle

#Set default programs
$terminal = kitty
$filemanager = thunar
$menu = tofi-drun

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,14
env = QT_QPA_PLATFORM,wayland
env = WLR_NO_HARDWARE_CURSORS,1 # Delete this line if your cursor feels laggy
#env = WLR_RENDERER_ALLOW_SOFTWARE,1
