source = ~/.cache/wal/colors-hyprland.conf

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = screenshot # takes a screenshot of your desktop
    color = $background
    blur_passes = 1 # 0 disables blurring
    blur_size = 7
    noise = 0.05
    crossfade_time = 1
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor = eDP-1
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $color6
    inner_color = $background
    font_color = $foreground
    check_color = $color4
    fail_color = $color1
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = $TIME. 
    color = $foreground
    font_size = 84
    font_family = Virgil 3 YOFF Bold Italic 
    position = -60, 20
    halign = right
    valign = bottom
}

label {
    monitor = eDP-1
    text = $USER.  
    color = $foreground
    font_size = 32
    font_family = Virgil 3 YOFF Bold Italic 
    position = -70, 160
    halign = right
    valign = bottom
}
