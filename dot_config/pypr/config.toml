[pyprland]
plugins = ["scratchpads"]

[scratchpads.term]
animation = "fromTop"
command = "kitty --class pypr-term"
class = "pypr-term"
size = "75% 60%"

[scratchpads.cheatsheet]
animation = "fromTop"
command = "zathura ~/.config/pypr/cheatsheet.pdf"
class = "org.pwmt.zathura"
size = "80% 60%"

[scratchpads.btop]
animation = "fromTop"
command = "kitty --class btop-scratchpad -e btop"
class = "btop-scratchpad"
size = "60% 60%"
margin = 50
lazy = true
